<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .card {
            width: 100%;
            max-width: 500px;
            border: 2px solid #333;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
        }

        .icon { width: 64px; height: 64px; background: #ccc; }

        .text-content { flex-grow: 1; }
        .title { font-weight: bold; font-size: 1.2em; display: block; }
        .description { color: #555; }

        .download-btn {
            padding: 10px 20px;
            background: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <img src="logo_company.jpg" alt="Header" style="width: 40%; max-width: 800px;">

    <div class="card">
        <img src="lobotomyproject.jpg" class="icon" alt="Icon">
        <div class="text-content">
            <span class="title">Lobotomy Project</span>
            <span class="description">Funny and stupid game.</span>
        </div>
        <a href="#" class="download-btn">Download</a>
    </div>

</body>
</html>
